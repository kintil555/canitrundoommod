name: Build Minecraft Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up JDK 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Setup Gradle wrapper
      run: |
        gradle wrapper --gradle-version 4.9 --distribution-type bin || true
        if [ ! -f gradlew ]; then
          curl -L https://services.gradle.org/distributions/gradle-4.9-bin.zip -o gradle.zip
          unzip -q gradle.zip
          gradle-4.9/bin/gradle wrapper
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup ForgeGradle (deobfuscation)
      run: |
        ./gradlew setupDecompWorkspace --no-daemon --stacktrace 2>&1 | tail -50 || true

    - name: Build mod
      run: ./gradlew build --no-daemon --stacktrace

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: canitrundoom-mod
        path: build/libs/*.jar
        if-no-files-found: error
