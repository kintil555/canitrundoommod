name: Build Minecraft Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Setup Gradle wrapper (4.9)
      run: |
        if [ ! -f gradlew ]; then
          curl -fL https://services.gradle.org/distributions/gradle-4.9-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          /tmp/gradle-4.9/bin/gradle wrapper --gradle-version 4.9
        fi
        chmod +x gradlew

    - name: Build mod
      run: ./gradlew build --no-daemon --stacktrace
      env:
        GRADLE_OPTS: "-Xmx3G"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: canitrundoom-mod
        path: build/libs/*.jar
        if-no-files-found: error
