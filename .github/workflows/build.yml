name: Build Minecraft Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Pre-populate Forge userdev from installer
      run: |
        FORGE_VER="1.12.2-14.23.5.2860"
        INSTALLER_URL="https://maven.minecraftforge.net/net/minecraftforge/forge/${FORGE_VER}/forge-${FORGE_VER}-installer.jar"
        MAVEN_DIR="${HOME}/.m2/repository/net/minecraftforge/forge/${FORGE_VER}"

        echo "Downloading Forge installer..."
        curl -fL "$INSTALLER_URL" -o /tmp/forge-installer.jar

        echo "Extracting userdev from installer..."
        mkdir -p /tmp/forge-extract
        cd /tmp/forge-extract
        jar xf /tmp/forge-installer.jar

        # Installer embeds artifacts under maven/ directory
        USERDEV_IN="maven/net/minecraftforge/forge/${FORGE_VER}/forge-${FORGE_VER}-userdev.jar"
        if [ ! -f "$USERDEV_IN" ]; then
          echo "ERROR: userdev not found in installer. Contents:"
          find /tmp/forge-extract -name "*.jar" | head -20
          exit 1
        fi

        echo "Injecting into local Maven cache..."
        mkdir -p "$MAVEN_DIR"
        # Copy all forge artifacts from installer to local maven
        cp maven/net/minecraftforge/forge/${FORGE_VER}/* "$MAVEN_DIR/" 2>/dev/null || true

        echo "Injected artifacts:"
        ls -lh "$MAVEN_DIR/"

    - name: Setup Gradle wrapper (4.9)
      run: |
        if [ ! -f gradlew ]; then
          curl -fL https://services.gradle.org/distributions/gradle-4.9-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          /tmp/gradle-4.9/bin/gradle wrapper --gradle-version 4.9
        fi
        chmod +x gradlew

    - name: Build mod
      run: ./gradlew build --no-daemon --stacktrace
      env:
        GRADLE_OPTS: "-Xmx3G"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: canitrundoom-mod
        path: build/libs/*.jar
        if-no-files-found: error
